sdk_generation_source:
  status: skeleton
  source_repo: zdp-api-contracts
  source_contract: contracts/sdk-generation-input.yaml
  generation_targets:
    - typescript
    - dart
    - rust
  required_route_metadata:
    - operation_id
    - resource
    - action
    - method
    - path
    - request_schema_ref
    - response_schema_ref
    - auth_required
    - permission_check
    - audit_event
    - idempotency
    - owner_boundary
    - tenant_boundary
    - request_id_required
    - trace_id_required
    - session_effect
    - credential_policy
    - success_statuses
    - error_codes
  required_error_metadata:
    - code
    - message
    - request_id
    - trace_id
    - retry_after_seconds
    - documentation_url
  required_client_runtime_metadata:
    - typed_fetch_operation_map
    - standard_error_envelope_normalization
    - request_id_propagation
    - trace_id_propagation
    - timeout_ms_option
    - abort_signal_option
    - idempotency_key_required_for_mutations
  required_webhook_metadata:
    - event_id
    - event_type
    - schema_version
    - signature_verification
    - idempotency_key
    - replay_policy
    - dead_letter_policy
  must_not_own:
    - API contract source
    - generated SDK source truth
    - SDK runtime implementation
    - product-specific business rules
    - refresh token storage
    - final authorization decisions
    - provider credential storage
  forbidden_values:
    - raw_customer_payload
    - raw_provider_error
    - provider_secret
    - authorization_header
    - cookie_header
    - refresh_token_plaintext
    - stack_trace
    - screen_component_payload
    - provider_specific_id_as_primary_id
    - raw_storage_url
    - unversioned_payload
    - provider_secret_in_schema
    - ledger_mutation_without_money_contract
