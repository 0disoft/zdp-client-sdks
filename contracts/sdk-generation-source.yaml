sdk_generation_source:
  status: skeleton
  source_repo: zdp-api-contracts
  source_contract: contracts/sdk-generation-input.yaml
  generation_targets:
    - typescript
    - dart
    - rust
  required_route_metadata:
    - operation_id
    - resource
    - action
    - method
    - path
    - request_schema_ref
    - response_schema_ref
    - auth_required
    - permission_check
    - audit_event
    - idempotency
    - success_statuses
    - error_codes
  required_error_metadata:
    - code
    - message
    - request_id
    - trace_id
    - retry_after_seconds
    - documentation_url
  required_webhook_metadata:
    - event_id
    - event_type
    - schema_version
    - signature_verification
    - idempotency_key
    - replay_policy
    - dead_letter_policy
  must_not_own:
    - API contract source
    - generated SDK source truth
    - refresh token storage
    - final authorization decisions
    - provider credential storage
  forbidden_values:
    - raw_customer_payload
    - raw_provider_error
    - provider_secret
    - authorization_header
    - cookie_header
    - screen_component_payload
