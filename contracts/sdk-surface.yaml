sdk_surface:
  languages:
    - typescript
    - dart
    - rust
  required_behaviors:
    - typed fetch operation map
    - typed fetch runtime foundation
    - request_id propagation
    - trace_id propagation
    - idempotency key propagation
    - standard error envelope handling
    - error envelope normalization
    - timeout option support
    - abort signal support
    - pagination handling
    - upload handoff
  must_not_own:
    - API contract source
    - refresh token storage
    - final authorization decisions
    - product-specific business rules
  forbidden_values:
    - raw_customer_payload
    - raw_provider_error
    - provider_secret
    - authorization_header
    - cookie_header
    - refresh_token_plaintext
    - stack_trace
    - screen_component_payload
  cross_language_requirements:
    - UTC ISO-8601 datetime strings
    - decimal-safe amount strings
    - BCP 47 locale strings
