exit:
  success_criteria:
    - TypeScript, Dart, and Rust SDK surfaces are bounded by API contracts
    - SDK generation source consumes zdp-api-contracts/contracts/sdk-generation-input.yaml
    - SDK libs export source consumes zdp-libs-ts public exports without owning libs package truth
    - SDK repository validates without live API endpoints
    - SDK generation source, libs export source, SDK surface, auth helper, and upload client contracts are machine-validated
    - SDK generation plan can be reproduced without writing SDK artifacts
    - SDK generation plan validates zdp-api-contracts sdk-generation-input drift before SDK artifacts exist
    - SDK generation plan validates zdp-api-contracts API export dry-run plan handoff before SDK artifacts exist
    - SDK generation plan validates typed fetch operation map metadata from zdp-api-contracts before generated SDK artifacts exist
    - Minimal TypeScript typed fetch runtime preserves request_id, trace_id, idempotency, timeout, abort, auth attachment, and standard error envelope handling without owning API truth
  kill_criteria:
    - SDK becomes the source of API truth
    - SDK stores refresh tokens or owns final authorization decisions
  sunset_plan: null
  owner: 0disoft
  review_at: null
  user_notice_days: null
  data_export_window_days: null
  dependency_removal_checklist: []

notes:
  - This MVP owns SDK boundaries and the minimal TypeScript typed fetch runtime foundation only; it does not publish SDK packages.
  - The local checker reads committed contract YAML only; it does not generate or publish SDK artifacts.
  - SDK generation source keeps TypeScript, Dart, and Rust SDKs tied to the same API handoff contract before generator work starts.
  - Libs export source keeps generated SDKs tied to the same schema, env, event, error, and i18n export names without making SDKs the libs package source.
  - Generation plan dry-run proves the SDK inputs are reproducible before any generated package is written or published.
  - API input drift check keeps zdp-api-contracts route, error, webhook metadata aligned with SDK planning.
  - API export plan handoff check keeps OpenAPI, SDK input, docs contract, webhook schema, and typed fetch operation map planning aligned with SDK planning before generated artifacts exist.
  - api.sdks names planned SDK generation targets only; it does not claim generated SDK artifacts exist yet.
  - Client SDKs must preserve request_id, trace_id, idempotency, owner, tenant, session, and credential policy metadata from API contracts before code generation.
  - The typed fetch runtime requires caller-provided baseUrl/fetch or environment fetch, access token providers for auth-required operations, and generated or declared operation maps; it does not store refresh tokens, choose a live API base URL, or become the API contract source.
