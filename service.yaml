  runbook_url: RUNBOOK.md

lifecycle:
  stage: foundation
  promotion_target_tier: tier2
  sunset_review_at: null
  degradation_policy: freeze SDK generation and keep last reviewed API contract

domain:
  type: platform
  user_facing: false
  public_api: false
  money_movement: false
  regulated: false

runtime:
  edge: null
  core: local-package
  framework: bun
  database: null
  cache: null
  object_storage: null
  home_region: null
  public_domains: []
  candidate_public_domains: []
  canonical_domain: null
  domain_status: none

cost:
  cost_center: client-sdks
  owner: 0disoft
  monthly_budget_limit_usd: 0
  warn_at_percent: 80
  block_at_percent: 100
  unit_metrics:
    - sdk-builds
    - generated-models
  per_action_budget: []
  provider_cost_dimensions: []
  gross_margin_floor_percent: null
  automatic_actions:
    - block SDK publish when API contract validation fails

data:
  owner_domain: platform
  classes: []
  datastores: []
  pii_level: none
  residency: null
  retention_days: null
  payment_data: false
  money_movement: false
  message_content: false
  ai_user_data: false
  crypto_key_material: false
  append_only_required: false
  encryption_key_owner: null
  backup_retention_days: null
  legal_hold_supported: false
  redaction_policy: do not include real tokens, customer payloads, or provider secrets in fixtures
  export_supported: true
  deletion:
    required: false
    sla_days: null
    targets: []
    propagation_events: []
    backup_policy: null
    tombstone_days: null
    legal_hold_policy: null
    manual_review_required: false
    evidence_required: false

access:
  auth_required: true
  tenant_boundary: none
  object_level_auth_required: true
  permission_model: rbac
  privileged_operations:
    - sdk-api-surface-change
    - sdk-publish
    - auth-helper-change
  rebac_model_ref: null
  break_glass_policy: null
  service_accounts: []
  admin_roles:
    - sdk-maintainer

audit:
  required: true
  events:
    - sdk_surface.changed
    - sdk_publish.reviewed
    - sdk_auth_helper.changed
  sink: zdp-platform-observability
  retention_days: 365
  immutable: false
  redaction_policy: do not log token or customer payload fixtures
  reason_required_for_admin_access: true
  evidence_export_supported: true

idempotency:
  required: false
  scope: null
  key_source: null
  dedupe_window_seconds: null
  store: null
  conflict_policy: null
  replay_safe: false
  retry_policy: null

observability:
  product_metrics: []
  operational_metrics:
    - sdk-contract-validation-success
    - sdk-contract-validation-failure
    - sdk-publish-review
  otel:
    service_name: client-sdks
    environment: local
    required_attributes:
      - service_id
      - cost_center
    propagation_headers:
      - traceparent
      - x-request-id
    sampling_policy: record validation and publish review events
    provider_span_required: false
    cost_attributes:
      - cost_center
      - language
    redacted_attributes:
      - token
      - secret
      - customer_payload

dependencies:
  services:
    - api-contracts
    - libs-ts
    - platform-observability
  datastores: []
  queues: []
  workers: []
  internal_apis: []
  fallback_paths:
    - keep last reviewed SDK surface when API contract is invalid

providers: []

ai:
  enabled: false
  sensitive_data: false
  long_streaming: false
  tools:
    required: false
    allowlist: []
  provider_policy:
    no_prompt_training_required: false
    zero_data_retention_required: false
    retention_exception_ref: null
  provider_capabilities:
    stream_cancellation_required: false
    tool_calling_required: false
    prompt_caching_allowed: false
    response_caching_allowed: false
  budgets:
    max_input_tokens: null
    max_output_tokens: null
    max_usd_per_request: null
    max_tool_calls_per_request: null

api:
  exposure: none
  versioning: semver once SDKs are published
  auth_scheme: null
  rate_limit_policy: null
  openapi_required: false
  sdks:
    ts: true
    dart: true
    rust: true
  deprecation_policy: required before public SDK adoption
  compatibility_policy: no breaking SDK API without changelog and migration note

events:
  cloudevents_required: false
  produced: []
  consumed: []
  replay_supported: false
  dead_letter_policy: null

release:
  environments:
    - local
  rollback_required: true
  migration_policy: generated SDK changes require API contract version reference
  change_approval: manual approval required for SDK publish
  freeze_windows: []
  canary_policy: null
  feature_flag_required: false

reliability:
  rpo: contract evidence recoverable from git history
  rto: 4h for SDK contract reconstruction
  slo_availability: contract repository available during planned work
  slo_latency_p95_ms: 1000
  night_page: false
  backup_required: true
  restore_drill_required: false
  status_page_required: false
  queue_replay_policy: null

policy_gates:
  required_linter_rules:
    - ZDP-REPO-BASELINE-001
    - ZDP-REPO-MARKDOWN-002

human_review_required:
  - SDK publish
  - auth helper behavior changes
  - breaking SDK surface changes

exit:
  success_criteria:
    - TypeScript, Dart, and Rust SDK surfaces are bounded by API contracts
    - SDK repository validates without live API endpoints
    - SDK surface, auth helper, and upload client contracts are machine-validated
  kill_criteria:
    - SDK becomes the source of API truth
    - SDK stores refresh tokens or owns final authorization decisions
  sunset_plan: null
  owner: 0disoft
  review_at: null
  user_notice_days: null
  data_export_window_days: null
  dependency_removal_checklist: []

notes:
  - This MVP owns SDK boundaries only; it does not publish SDK packages.
  - The local checker reads committed contract YAML only; it does not generate or publish SDK artifacts.
